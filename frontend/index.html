<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HRMS — Login</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

<div class="login-page">
  <div class="login-card">
    <div class="login-logo">
      <div class="logo-icon"><i class="bi bi-people-fill"></i></div>
      <div class="logo-text">HR<span>MS</span></div>
    </div>

    <h1 class="login-title">Welcome back</h1>
    <p class="login-subtitle">Sign in to your admin dashboard</p>

    <div id="loginError" class="alert alert-danger d-none py-2 px-3 mb-3"
      style="border-radius:10px;font-size:13px;"></div>

    <div class="mb-3">
      <label class="form-label">Email Address</label>
      <input type="email" id="loginEmail" class="form-control"
        placeholder="admin@company.com" autocomplete="email" />
    </div>

    <div class="mb-4">
      <label class="form-label">Password</label>
      <div style="position:relative;">
        <input type="password" id="loginPassword" class="form-control"
          placeholder="••••••••" autocomplete="current-password"
          style="padding-right:44px;" />
        <button type="button" onclick="togglePwd()"
          style="position:absolute;right:12px;top:50%;transform:translateY(-50%);
                 background:none;border:none;color:rgba(255,255,255,0.4);
                 font-size:16px;cursor:pointer;">
          <i id="eyeIcon" class="bi bi-eye"></i>
        </button>
      </div>
    </div>

    <button class="btn-login" onclick="doLogin()" id="loginBtn">
      <span id="loginBtnText"><i class="bi bi-box-arrow-in-right me-1"></i> Sign In</span>
      <span id="loginBtnSpinner" class="d-none">
        <span class="spinner-border spinner-border-sm"
          style="width:14px;height:14px;border-width:2px;"></span> Signing in…
      </span>
    </button>

    <p style="color:rgba(255,255,255,0.2);font-size:12px;text-align:center;margin-top:24px;">
      HRMS Admin Portal &nbsp;·&nbsp; v2.0
    </p>
  </div>
</div>

<div id="alertToast" class="alert-toast"></div>
<div id="loadingOverlay" class="loading-overlay"><div class="spinner-ring"></div></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/auth.js"></script>
<script src="js/api.js"></script>
<script>
  redirectIfLoggedIn();

  function togglePwd() {
    const inp  = document.getElementById('loginPassword');
    const icon = document.getElementById('eyeIcon');
    if (inp.type === 'password') {
      inp.type = 'text'; icon.className = 'bi bi-eye-slash';
    } else {
      inp.type = 'password'; icon.className = 'bi bi-eye';
    }
  }

  document.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });

  async function doLogin() {
    const email    = document.getElementById('loginEmail').value.trim();
    const password = document.getElementById('loginPassword').value;
    const errEl    = document.getElementById('loginError');
    errEl.classList.add('d-none');

    if (!email || !password) {
      errEl.textContent = 'Please enter your email and password.';
      errEl.classList.remove('d-none');
      return;
    }

    // Show spinner
    document.getElementById('loginBtnText').classList.add('d-none');
    document.getElementById('loginBtnSpinner').classList.remove('d-none');
    document.getElementById('loginBtn').disabled = true;

    /*
      POST /company/login
      Body: { "Email": "...", "Password": "..." }
      Response: { "message": "Login successful", "token": "..." }
    */
    const data = await apiLogin(email, password);

    document.getElementById('loginBtnText').classList.remove('d-none');
    document.getElementById('loginBtnSpinner').classList.add('d-none');
    document.getElementById('loginBtn').disabled = false;

    if (!data) return; // error already shown by apiLogin

    const token = data.token;
    if (!token) {
      errEl.textContent = 'Login failed: no token received from server.';
      errEl.classList.remove('d-none');
      return;
    }

    // Decode JWT to get tenantId and email
    // JWT payload: { tenantId, email, iat, exp }
    const payload = decodeJWT(token);

    setToken(token);
    setUser({
      tenantId: payload?.tenantId,
      email:    payload?.email || email,
      name:     payload?.email || email,
    });

    window.location.href = 'dashboard.html';
  }
</script>
</body>
</html>
